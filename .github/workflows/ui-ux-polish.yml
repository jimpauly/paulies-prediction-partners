name: "Daily UI/UX polish"

on:
  schedule:
    - cron: '0 0 * * *'   # run once a day (midnight UTC)
  workflow_dispatch:     # allow manual trigger as well

permissions:
  contents: write

jobs:
  check-and-polish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Read current project stage
        id: stage
        run: |
          if grep -q '^stage:\s*2' DOCUMENTS/0-PRODUCT-REQUIREMENTS.md; then
            echo "stage=2" >> $GITHUB_OUTPUT
          else
            echo "stage=not2" >> $GITHUB_OUTPUT
          fi

      - name: Skip if not stage 2
        if: ${{ steps.stage.outputs.stage != '2' }}
        run: echo "Project is not at stage 2 yet; skipping UI/UX work."

      - name: Enhance & polish UI/UX
        if: ${{ steps.stage.outputs.stage == '2' }}
        run: |
          echo "Running UI/UX enhancement scripts..."
          # insert actual UI/UX update commands here

      - name: Set up Node.js for screenshot
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          mkdir -p /tmp/playwright-runner
          cd /tmp/playwright-runner
          npm init -y
          npm install playwright@latest
          npx playwright install chromium --with-deps
        env:
          NODE_PATH: /tmp/playwright-runner/node_modules

      - name: Start local web server
        run: |
          cd webpage/apps/web/public
          python3 -m http.server 4173 &
          # wait for the server to be ready
          SERVER_READY=false
          for i in $(seq 1 10); do
            if curl -s http://localhost:4173 > /dev/null; then
              echo "Server is up"
              SERVER_READY=true
              break
            fi
            sleep 1
          done
          if [ "$SERVER_READY" = "false" ]; then
            echo "ERROR: local web server failed to start within 10 seconds" >&2
            exit 1
          fi

      - name: Take screenshot of web page
        run: |
          mkdir -p webpage/screenshots
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          SCREENSHOT_PATH="${GITHUB_WORKSPACE}/webpage/screenshots/screenshot-${TIMESTAMP}.png"

          node --input-type=commonjs << EOF
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            await page.setViewportSize({ width: 1280, height: 800 });
            await page.goto('http://localhost:4173', { waitUntil: 'networkidle' });
            await page.screenshot({ path: "${SCREENSHOT_PATH}", fullPage: true });
            await browser.close();
            console.log("Screenshot saved: ${SCREENSHOT_PATH}");
          })().catch(err => { console.error(err); process.exit(1); });
          EOF
        env:
          NODE_PATH: /tmp/playwright-runner/node_modules

      - name: Commit updated screenshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add webpage/screenshots/
          if git diff --cached --quiet; then
            echo "No new screenshots to commit."
          else
            git commit -m "chore: update UI screenshot after polish run [skip ci]"
            git push
          fi
